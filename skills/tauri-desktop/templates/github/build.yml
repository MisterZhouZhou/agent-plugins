name: Build

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  preflight:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npm run sync-version
      - run: npm run typecheck
      - run: npm run build

  build:
    needs: preflight
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macos-aarch64
            platform: macos-latest
            args: --target aarch64-apple-darwin
            release_dir: target/aarch64-apple-darwin/release
          - label: macos-x86_64
            platform: macos-latest
            args: --target x86_64-apple-darwin
            release_dir: target/x86_64-apple-darwin/release
          - label: windows
            platform: windows-latest
            args: ""
            release_dir: target/release
          - label: linux
            platform: ubuntu-22.04
            args: ""
            release_dir: target/release
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux dependencies
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf pkg-config libsoup-3.0-dev javascriptcoregtk-4.1 libjavascriptcoregtk-4.1-dev libnm-dev xdg-utils
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npm run sync-version
      - name: Build Tauri app
        run: npx tauri build --ci --config '{"bundle":{"createUpdaterArtifacts":false}}' ${{ matrix.args }}
      - uses: actions/upload-artifact@v4
        with:
          name: bundles-${{ matrix.label }}
          path: ${{ matrix.release_dir }}/bundle
          if-no-files-found: error
